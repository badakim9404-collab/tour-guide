name: Crawl Business Hours

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'new_only: 비어있는 장소만 / all: 전체 크롤링'
        required: false
        default: 'new_only'
        type: choice
        options:
          - new_only
          - all

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          python -c "import requests; print('requests OK')"
          python -c "from playwright.sync_api import sync_playwright; print('playwright OK')"

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Pull latest changes
        run: git pull --rebase origin master

      - name: Run crawler
        run: python scripts/crawl_hours.py --mode ${{ github.event.inputs.mode || 'new_only' }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 크롤링 결과 백업
          cp data/business-hours.json /tmp/business-hours.json
          cp data/places.json /tmp/places.json

          # 최대 3회 재시도 (크롤링 중 sync push로 인한 충돌 대응)
          for i in 1 2 3; do
            echo "=== 푸시 시도 $i/3 ==="

            # 진행 중인 rebase 정리
            git rebase --abort 2>/dev/null || true

            # 로컬을 원격 최신으로 리셋
            git fetch origin master
            git reset --hard origin/master

            # 크롤링 결과를 최신 places.json에 병합
            python scripts/merge_hours.py /tmp/places.json /tmp/business-hours.json

            git add data/business-hours.json data/places.json
            if git diff --staged --quiet; then
              echo "변경사항 없음"
              exit 0
            fi

            git commit -m "Update business hours $(date +%Y-%m-%d)"

            if git push origin master; then
              echo "푸시 성공"
              exit 0
            fi

            echo "푸시 실패, 재시도..."
            sleep 3
          done

          echo "3회 시도 모두 실패"
          exit 1
