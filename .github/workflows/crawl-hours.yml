name: 영업시간 크롤링

on:
  # 매주 월요일 오전 3시 (KST) 자동 실행
  schedule:
    - cron: '0 18 * * 0'  # UTC 일요일 18시 = KST 월요일 03시
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: |
          pip install -r scripts/requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 크롤링 실행
        run: python scripts/crawl_hours.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/business-hours.json
          git diff --staged --quiet || git commit -m "영업시간 데이터 업데이트 $(date +%Y-%m-%d)"
          git push
