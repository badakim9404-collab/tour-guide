<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily의 투어 노트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="logo" id="logoBtn">
                <i class="fas fa-map-marked-alt"></i> Emily의 투어 노트
            </h1>
            <button class="btn btn-icon btn-backup" id="backupBtn" title="데이터 관리">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" id="newPostBtn">
                <i class="fas fa-pen"></i> <span>글쓰기</span>
            </button>
            <button class="btn btn-secondary" id="placesBtn">
                <i class="fas fa-map-pin"></i> <span>장소관리</span>
            </button>
            <button class="btn btn-secondary" id="mapBtn">
                <i class="fas fa-map"></i> <span>지도</span>
            </button>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 사이드바 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>카테고리</h3>
            </div>
            <div class="category-tree" id="categoryTree"></div>
            <button class="btn btn-text sidebar-manage-btn" id="manageCategoryBtn">
                <i class="fas fa-cog"></i> 카테고리 관리
            </button>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content" id="mainContent">
            <!-- 동적으로 렌더링 -->
        </main>
    </div>

    <!-- 푸터 -->
    <footer class="footer">
        <p>&copy; 2026 Emily의 투어 노트</p>
    </footer>

    <!-- 모달 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="btn btn-icon modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- 확인 다이얼로그 -->
    <div class="modal-overlay" id="confirmOverlay">
        <div class="modal confirm-modal">
            <div class="modal-body">
                <p id="confirmMessage"></p>
                <div class="confirm-buttons">
                    <button class="btn btn-danger" id="confirmYes">삭제</button>
                    <button class="btn btn-secondary" id="confirmNo">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/category.js"></script>
    <script src="js/post.js"></script>
    <script src="js/place.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
